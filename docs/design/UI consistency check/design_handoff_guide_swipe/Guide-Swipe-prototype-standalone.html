  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rsor:pointer;\">\n                  <span style=\"flex:none;display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:var(--sig-btn);color:#fff;\">\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><polygon points=\"6 3 20 12 6 21 6 3\"><\u002Fpolygon><\u002Fsvg>\n                  <\u002Fspan>\n                  {{ eqBars }}\n                  <span style=\"flex:1;\"><\u002Fspan>\n                  <span style=\"font-size:13px;font-weight:600;color:var(--sig-link);\">{{ listenLabel }}<\u002Fspan>\n                <\u002Fbutton>\n                <span style=\"flex:none;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);\">{{ speedLabel }}<\u002Fspan>\n              <\u002Fdiv>\n\n              <!-- Tabs -->\n              <div style=\"display:flex;gap:18px;margin-top:16px;border-bottom:1px solid var(--hair);\">\n                <button type=\"button\" onclick=\"{{ onStory }}\" style=\"{{ tabStoryStyle }}\">Story<\u002Fbutton>\n                <button type=\"button\" onclick=\"{{ onFacts }}\" style=\"{{ tabFactsStyle }}\">Interesting Facts<\u002Fbutton>\n                <button type=\"button\" onclick=\"{{ onExp }}\" style=\"{{ tabExpStyle }}\">Experience<\u002Fbutton>\n              <\u002Fdiv>\n              <p style=\"font-size:13px;line-height:1.55;color:var(--muted);margin:12px 1px 0;min-height:60px;\">{{ tabBody }}<\u002Fp>\n\n              <!-- Actions -->\n              <div style=\"display:flex;gap:9px;margin-top:14px;\">\n                <button type=\"button\" onclick=\"{{ onDirections }}\" style=\"flex:1;border-radius:12px;background:var(--sig-btn);color:#fff;font-weight:600;font-size:13.5px;padding:11px;min-height:44px;border:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"3 11 22 2 13 21 11 13 3 11\"><\u002Fpolygon><\u002Fsvg>\n                  Directions\n                <\u002Fbutton>\n                <button type=\"button\" onclick=\"{{ onComplete }}\" aria-label=\"{{ checkAria }}\" aria-pressed=\"{{ focused.completed }}\" style=\"{{ checkBtnStyle }}\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Hint washes -->\n            <div ref=\"{{ doneWashRef }}\" aria-hidden=\"true\" style=\"position:absolute;inset:0;border-radius:18px;opacity:0;pointer-events:none;background:linear-gradient(0deg,rgba(156,61,58,.72),rgba(176,71,63,.62));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#fff;transition:opacity .1s linear;\">\n              <span style=\"display:grid;place-items:center;width:58px;height:58px;border-radius:50%;border:2px solid rgba(255,255,255,.9);\">\n                <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n              <\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.22em;font-weight:600;\">DONE · NEXT<\u002Fspan>\n            <\u002Fdiv>\n            <div ref=\"{{ backWashRef }}\" aria-hidden=\"true\" style=\"position:absolute;inset:0;border-radius:18px;opacity:0;pointer-events:none;background:linear-gradient(180deg,rgba(8,8,11,.62),rgba(8,8,11,.5));backdrop-filter:blur(1px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#fff;transition:opacity .1s linear;\">\n              <span style=\"display:grid;place-items:center;width:58px;height:58px;border-radius:50%;border:2px solid rgba(255,255,255,.85);\">\n                <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 14 4 9 9 4\"><\u002Fpolyline><path d=\"M20 20v-7a4 4 0 0 0-4-4H4\"><\u002Fpath><\u002Fsvg>\n              <\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.22em;font-weight:600;\">BACK<\u002Fspan>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Directions flash -->\n      <sc-if value=\"{{ flash }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:var(--muted);text-align:center;margin:2px 0 8px;\">{{ flash }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Upcoming rows -->\n      <div style=\"display:flex;flex-direction:column;gap:2px;margin-top:8px;\">\n        <sc-for list=\"{{ upcomingRows }}\" as=\"row\" hint-placeholder-count=\"3\">\n          <button type=\"button\" onclick=\"{{ row.onFocus }}\" style=\"display:flex;width:100%;align-items:center;gap:12px;padding:10px 2px;background:transparent;border:0;cursor:pointer;text-align:left;\">\n            <span aria-hidden=\"true\" style=\"flex:none;display:grid;place-items:center;width:21px;height:21px;border-radius:50%;border:1px solid color-mix(in oklab,var(--ink) 20%,transparent);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;\">{{ row.number }}<\u002Fspan>\n            <span style=\"min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;color:color-mix(in oklab,var(--ink) 80%,transparent);\">{{ row.name }}<\u002Fspan>\n            <span style=\"flex:none;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);\">{{ row.meta }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- All-done line -->\n      <sc-if value=\"{{ allDone }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:18px;padding:15px 16px;border-radius:14px;border:1px solid var(--hair);background:color-mix(in oklab,var(--sig) 7%,transparent);\">\n          <p style=\"font-family:'Fraunces',serif;font-size:18px;color:var(--ink);margin:0 0 4px;\">Day complete<\u002Fp>\n          <p style=\"font-size:12.5px;line-height:1.5;color:var(--muted);margin:0;\">Every stop today is done. Swipe right or reopen any completed stop above to revisit it.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n    <!-- Bottom tab bar -->\n    <div style=\"position:absolute;left:0;right:0;bottom:0;display:flex;align-items:flex-start;justify-content:space-around;padding:10px 24px 24px;background:color-mix(in oklab,var(--base) 84%,transparent);backdrop-filter:blur(14px);border-top:1px solid var(--hair);z-index:30;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h.01\"><\u002Fpath><path d=\"M3 12h.01\"><\u002Fpath><path d=\"M3 18h.01\"><\u002Fpath><path d=\"M8 6h13\"><\u002Fpath><path d=\"M8 12h13\"><\u002Fpath><path d=\"M8 18h13\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:10.5px;\">Plan<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--sig-link);\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polygon points=\"16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76\"><\u002Fpolygon><\u002Fsvg>\n        <span style=\"font-size:10.5px;font-weight:600;\">Guide<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect width=\"20\" height=\"14\" x=\"2\" y=\"7\" rx=\"2\"><\u002Frect><path d=\"M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:10.5px;\">Trip<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Motion tokens + notes -->\n  <div style=\"width:392px;max-width:100%;display:flex;flex-direction:column;gap:14px;\">\n    <div style=\"border:1px solid var(--hair);border-radius:14px;background:var(--raised);padding:16px 17px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sig-link);margin-bottom:10px;\">Motion tokens — copy into Guide.tsx<\u002Fdiv>\n      <pre style=\"margin:0;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:var(--ink);white-space:pre-wrap;\">{{ tokenText }}<\u002Fpre>\n    <\u002Fdiv>\n    <div style=\"border:1px solid var(--hair);border-radius:14px;background:var(--raised);padding:16px 17px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sig-link);margin-bottom:10px;\">Notes &amp; recommendations<\u002Fdiv>\n      <ul style=\"margin:0;padding-left:18px;font-size:12.5px;line-height:1.65;color:var(--muted);\">\n        <li><b style=\"color:var(--ink);font-weight:600;\">Surrounding UI is unchanged<\u002Fb> — same GuideProgress segmented bar, the \"{n} stops complete · names\" disclosure, UpcomingRow rows, day strip and tab bar. The swipe only wraps the focused card.<\u002Fli>\n        <li><b style=\"color:var(--ink);font-weight:600;\">Left = done+next<\u002Fb> throws up-left into Completed; the next stop rises from below. <b style=\"color:var(--ink);font-weight:600;\">Right = back<\u002Fb> throws down-right; the previous drops from above. Back-swipe never changes completion.<\u002Fli>\n        <li>Trigger factors <b style=\"color:var(--ink);font-weight:600;\">distance OR velocity<\u002Fb> — a short fast flick commits. Under threshold rubber-bands back; nothing happens.<\u002Fli>\n        <li><b style=\"color:var(--ink);font-weight:600;\">Edges:<\u002Fb> right on stop 1 and left on the last stop resist (~0.3 elastic) and spring back. The ✓ still completes the last stop in place (VISITED + \"Day complete\").<\u002Fli>\n        <li><b style=\"color:var(--ink);font-weight:600;\">Reduced motion<\u002Fb> (toggle / <code>prefers-reduced-motion<\u002Fcode>): no tilt, throw collapses to a ~140ms cross-fade.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.stageRef = React.createRef();\n    this.cardRef = React.createRef();\n    this.ghostLayerRef = React.createRef();\n    this.doneWashRef = React.createRef();\n    this.backWashRef = React.createRef();\n\n    this.T = {\n      THRESHOLD: 92, VEL: 0.5, MIN_FLICK: 36,\n      TILT: 0.05, MAX_TILT: 8, EDGE_ELASTIC: 0.3,\n      EXIT_X: 340, EXIT_Y: 230, EXIT_ROT: 14, ENTER_Y: 130,\n      DUR_EXIT: 340, DUR_ENTER: 320, ENTER_DELAY: 30,\n      DUR_SPRING: 460, REDUCED_FADE: 140,\n      EASE: 'cubic-bezier(.4,0,.2,1)', SPRING: 'cubic-bezier(.22,1,.36,1)',\n    };\n\n    const stripe = 'repeating-linear-gradient(135deg,rgba(255,255,255,.05) 0 1px,transparent 1px 13px),';\n    const mk = (name,type,eta,c1,c2,story,facts,experience)=>({name,type,eta,meta:eta,heroBg:stripe+`linear-gradient(160deg,${c1},${c2})`,story,facts,experience});\n    this.stops = [\n      mk('Hotel check-in & Breakfast','café · Canal Belt','','#2d2a24','#15120f',\n        'Drop the bags at the canal-house hotel and start slow over coffee and an uitsmijter at Café George.',\n        'The building is a restored 17th-century merchant\\u2019s house — the steep stairs are protected, the hoist beam still works.',\n        'Ask for a window table over the Keizersgracht and watch the morning boats before you set out.'),\n      mk('Leidseplein','square','4 MIN','#2c2f3a','#121317',\n        'A buzzing theatre square where the trams, the Stadsschouwburg and the late-night cafés all converge.',\n        'The Stadsschouwburg has staged Amsterdam\\u2019s civic theatre since 1894; the square is the city\\u2019s nightlife hinge.',\n        'Cut through the side streets for the smaller brown cafés rather than the neon-lit terraces.'),\n      mk('Rembrandt Square','square','12 MIN','#3a2f26','#171310',\n        'A leafy square named for the painter, ringed by grand café terraces and centred on his bronze statue.',\n        'The 3-D bronze cast of The Night Watch stands beside Rembrandt — 22 figures you can walk among.',\n        'Come back after dark: the terraces glow and the statue group is quietly lit.'),\n      mk('Bloemenmarkt','market','8 MIN','#26352c','#101512',\n        'The world\\u2019s only floating flower market, its stalls built on barges along the Singel.',\n        'Trading here since 1862; the stalls literally float on the canal beneath the displays.',\n        'Buy tulip bulbs you can take home rather than cut stems that won\\u2019t survive the trip.'),\n      mk('Rijksmuseum','museum','10 MIN','#332636','#161018',\n        'The national museum of the Netherlands — Vermeer, Rembrandt and 800 years of Dutch art in one palace.',\n        'The building\\u2019s cycle passage is the only one running through a museum anywhere in the world.',\n        'Go straight to the Gallery of Honour first, before the crowds reach The Night Watch.'),\n      mk('Van Gogh Museum','museum','5 MIN','#2a2f25','#121410',\n        'The largest collection of Van Gogh\\u2019s work anywhere, hung in the order his life unfolded.',\n        'Holds more than 200 paintings and 500 drawings — the world\\u2019s deepest single-artist holding.',\n        'Pre-book a timed slot; same-day tickets at the door rarely exist.'),\n      mk('Vondelpark','park','7 MIN','#26352c','#101512',\n        'Amsterdam\\u2019s green lung — 47 hectares of ponds, lawns and an open-air theatre.',\n        'Around ten million visitors a year; the open-air theatre\\u2019s summer programme is free.',\n        'Rent a bike at the gate and loop the outer path before resting at the rose garden.'),\n      mk('Anne Frank House','historic house','18 MIN','#2c2f3a','#121317',\n        'The canal-side house where the Frank family hid, preserved behind the moving bookcase.',\n        'The Secret Annexe is kept deliberately unfurnished, exactly as it was left in 1944.',\n        'Book weeks ahead — entry is timed and almost always sold out on the day.'),\n      mk('Jordaan','neighbourhood','6 MIN','#3a2f26','#171310',\n        'The former working-class quarter, now a maze of narrow lanes, courtyards and brown cafés.',\n        'Built in the 17th century for artisans; many of its hidden hofjes almshouses are still occupied.',\n        'Wander without a map — the best of the Jordaan is whatever you stumble onto.'),\n      mk('Dam Square','square','14 MIN','#332636','#161018',\n        'The historic heart of the city, where the river Amstel was first dammed.',\n        'The National Monument obelisk honours the dead of the Second World War.',\n        'Stand with your back to the Palace at dusk for the best read of the square.'),\n      mk('Royal Palace','palace','3 MIN','#2d2a24','#15120f',\n        'A 17th-century town hall turned royal residence, raised on 13,659 wooden piles.',\n        'Once called the eighth wonder of the world for the scale of its marble Citizens\\u2019 Hall.',\n        'Catch the Citizens\\u2019 Hall when sun hits the marble inlaid maps of the heavens.'),\n      mk('Begijnhof','courtyard','9 MIN','#26352c','#101512',\n        'A hushed medieval courtyard of almshouses around a hidden chapel, a step out of the city noise.',\n        'Home to Amsterdam\\u2019s oldest surviving wooden house, dating to around 1420.',\n        'Keep your voice low — people still live here; it closes to visitors at dusk.'),\n    ];\n\n    this.state = {\n      completed: [0,1],\n      focusedIndex: 2,\n      completedExpanded: true,\n      activeTab: 'story',\n      listenPlaying: false,\n      theme: 'dark',\n      reducedShown: false,\n      flash: '',\n    };\n\n    this.down=false; this.dragging=false; this.startX=0; this.startY=0;\n    this.lastX=0; this.lastT=0; this.vx=0; this.pointerId=null;\n    this.reduced=false; this.busy=false; this._flashTimer=null;\n  }\n\n  componentDidMount(){\n    try{\n      if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){\n        this.reduced=true; this.setState({reducedShown:true});\n      }\n    }catch(e){}\n  }\n\n  clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }\n  isLeftNoop(){ return this.state.focusedIndex >= this.stops.length-1; }\n  isRightNoop(){ return this.state.focusedIndex <= 0; }\n  isC(i){ return this.state.completed.includes(i); }\n\n  onPointerDown = (e)=>{\n    if(this.busy) return;\n    this.down=true; this.dragging=false;\n    this.startX=e.clientX; this.startY=e.clientY;\n    this.lastX=e.clientX; this.lastT=performance.now(); this.vx=0;\n    this.pointerId=e.pointerId;\n  };\n\n  onPointerMove = (e)=>{\n    if(!this.down) return;\n    const dx=e.clientX-this.startX, dy=e.clientY-this.startY;\n    if(!this.dragging){\n      if(Math.abs(dx)>6 && Math.abs(dx)>Math.abs(dy)){\n        this.dragging=true;\n        try{ this.cardRef.current.setPointerCapture(this.pointerId); }catch(_){} s(old)) completed.push(old); newFocus=old+1; }\n    else { newFocus=old-1; }\n\n    const ghost=c.cloneNode(true);\n    ghost.style.position='absolute'; ghost.style.inset='0'; ghost.style.margin='0';\n    ghost.style.transition='none'; ghost.style.pointerEvents='none';\n    ghost.style.transform=c.style.transform||'translateX(0)';\n    ghost.style.zIndex='6';\n    this.ghostLayerRef.current.appendChild(ghost);\n\n    const enterY = dir==='left' ? T.ENTER_Y : -T.ENTER_Y;\n    c.style.transition='none';\n    c.style.opacity='0';\n    c.style.transform = this.reduced ? 'none' : `translateY(${enterY}px)`;\n    this.doneWashRef.current.style.opacity='0';\n    this.backWashRef.current.style.opacity='0';\n\n    this.setState({ completed, focusedIndex:newFocus, activeTab:'story', listenPlaying:false });\n\n    requestAnimationFrame(()=>requestAnimationFrame(()=>{\n      if(this.reduced){\n        ghost.style.transition=`opacity ${T.REDUCED_FADE}ms linear`; ghost.style.opacity='0';\n        c.style.transition=`opacity ${T.REDUCED_FADE}ms linear`; c.style.transform='none'; c.style.opacity='1';\n      } else {\n        const ex=dir==='left'?-T.EXIT_X:T.EXIT_X, ey=dir==='left'?-T.EXIT_Y:T.EXIT_Y, er=dir==='left'?-T.EXIT_ROT:T.EXIT_ROT;\n        ghost.style.transition=`transform ${T.DUR_EXIT}ms ${T.EASE}, opacity ${T.DUR_EXIT}ms ${T.EASE}`;\n        ghost.style.transform=`translate(${ex}px,${ey}px) rotate(${er}deg)`; ghost.style.opacity='0';\n        c.style.transition=`transform ${T.DUR_ENTER}ms ${T.EASE} ${T.ENTER_DELAY}ms, opacity ${T.DUR_ENTER}ms ${T.EASE} ${T.ENTER_DELAY}ms`;\n        c.style.transform='translateY(0) rotate(0deg)'; c.style.opacity='1';\n      }\n    }));\n\n    const total=(this.reduced?T.REDUCED_FADE:T.DUR_EXIT)+T.ENTER_DELAY+40;\n    setTimeout(()=>{\n      if(ghost.parentNode) ghost.parentNode.removeChild(ghost);\n      if(this.cardRef.current){ this.cardRef.current.style.transition=''; this.cardRef.current.style.opacity='1'; this.cardRef.current.style.transform=''; }\n      this.busy=false;\n    }, total);\n  }\n\n  fadeInCard(){\n    const c=this.cardRef.current; if(!c) return;\n    c.style.transition='none'; c.style.opacity='0'; c.style.transform='none';\n    requestAnimationFrame(()=>requestAnimationFrame(()=>{\n      c.style.transition='opacity 160ms linear'; c.style.opacity='1';\n    }));\n  }\n\n  focusRow(i){\n    if(this.busy) return;\n    this.setState({focusedIndex:i, activeTab:'story', listenPlaying:false});\n    this.fadeInCard();\n  }\n  undo(i){\n    this.setState(s=>({completed:s.completed.filter(x=>x!==i)}));\n  }\n  toggleCompleted = ()=> this.setState(s=>({completedExpanded:!s.completedExpanded}));\n\n  onComplete = ()=>{\n    if(this.busy) return;\n    const f=this.state.focusedIndex;\n    if(this.isC(f)){ this.undo(f); return; }\n    if(!this.isLeftNoop()){ this.commit('left'); return; }\n    this.setState(s=>({completed: s.completed.includes(f)?s.completed:[...s.completed,f]}));\n  };\n\n  onStory = ()=> this.setState({activeTab:'story'});\n  onFacts = ()=> this.setState({activeTab:'facts'});\n  onExp = ()=> this.setState({activeTab:'experience'});\n  onListen = ()=> this.setState(s=>({listenPlaying:!s.listenPlaying}));\n\n  onDirections = ()=>{\n    this.setState({flash:'↗  Handing off to your maps app…'});\n    if(this._flashTimer) clearTimeout(this._flashTimer);\n    this._flashTimer=setTimeout(()=>this.setState({flash:''}),1500);\n  };\n\n  toggleTheme = ()=>{\n    const next=this.state.theme==='dark'?'light':'dark';\n    const st=this.stageRef.current;\n    if(st){ st.classList.remove('vy-dark','vy-light'); st.classList.add('vy-'+next); }\n    this.setState({theme:next});\n  };\n  toggleReduced = ()=>{ this.reduced=!this.reduced; this.setState({reducedShown:this.reduced}); };\n\n  onReset = ()=>{\n    this.busy=false;\n    if(this.ghostLayerRef.current) this.ghostLayerRef.current.innerHTML='';\n    if(this.cardRef.current){ this.cardRef.current.style.transition=''; this.cardRef.current.style.transform=''; this.cardRef.current.style.opacity='1'; }\n    this.setState({completed:[0,1], focusedIndex:2, completedExpanded:true, activeTab:'story', listenPlaying:false, flash:''});\n  };\n\n  rowVM(i, done){\n    const s=this.stops[i];\n    return { number:i+1, name:s.name, meta:s.meta, onFocus:()=>this.focusRow(i), onUndo: done?()=>this.undo(i):null };\n  }\n\n  tabStyle(active){\n    return 'flex:none;background:transparent;border:0;padding:0 0 9px;margin-bottom:-1px;cursor:pointer;font-family:\\'JetBrains Mono\\',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:'+(active?'600':'500')+';color:'+(active?'var(--ink)':'var(--muted)')+';border-bottom:2px solid '+(active?'var(--sig-link)':'transparent')+';';\n  }\n\n  renderVals(){\n    const T=this.T;\n    const st=this.stops, f=this.state.focusedIndex, completed=this.state.completed;\n    const isC=(i)=>completed.includes(i);\n    let current=-1; for(let i=0;i<st.length;i++){ if(!isC(i)){ current=i; break; } }\n    const allDone=current<0;\n    const currentNumber = allDone?st.length:current+1;\n    const focusedCompleted=isC(f);\n    const completedOpen=this.state.completedExpanded || focusedCompleted;\n\n    const completedIdx=st.map((s,i)=>i).filter(i=>isC(i));\n    const completedRows=completedIdx.filter(i=>i!==f).map(i=>this.rowVM(i,true));\n    const upcomingRows=st.map((s,i)=>i).filter(i=>!isC(i)&&i!==f).map(i=>this.rowVM(i,false));\n    const completedNames=completedIdx.map(i=>st[i].name);\n    const nC=completedIdx.length;\n    const completedSummary = nC>0 ? `${nC} stop${nC===1?'':'s'} complete · ${completedNames.join(', ')}` : '';\n\n    const fs=st[f];\n    const chipText = focusedCompleted ? 'VISITED' : (fs.eta ? `NOW · ${fs.eta}` : 'NOW');\n    const tab=this.state.activeTab;\n    const tabBody = tab==='story'?fs.story : tab==='facts'?fs.facts : fs.experience;\n    const dotStyle = 'width:6px;height:6px;border-radius:50%;background:#fff;'+(focusedCompleted?'':'animation:vyPulse 1.4s ease-in-out infinite;');\n\n    const checkBtnStyle = 'flex:none;display:grid;place-items:center;width:44px;min-height:44px;border-radius:12px;cursor:pointer;border:1px solid '+(focusedCompleted?'color-mix(in oklab,var(--sig) 40%,transparent)':'var(--hair-strong)')+';background:'+(focusedCompleted?'color-mix(in oklab,var(--sig) 12%,transparent)':'transparent')+';color:'+(focusedCompleted?'var(--sig)':'color-mix(in oklab,var(--ink) 80%,transparent)')+';transition:background .2s,border-color .2s,color .2s;';\n\n    // Progress segments\n    const filled=allDone?st.length:currentNumber;\n    const remaining=st.length-filled;\n    const segs=[];\n    for(let i=0;i<filled;i++){\n      const isCur=!allDone && i===filled-1;\n      segs.push({ style:`flex:1 1 0;height:3px;border-radius:2px;background:var(--sig-btn);${isCur?'animation:vySeg 1.7s ease-in-out infinite;':''}` });\n    }\n    const trackStyle = remaining>0?`flex:${remaining} 1 0;height:3px;border-radius:2px;background:var(--hair);`:'';\n\n    // Listen equalizer (decorative animation node)\n    const playing=this.state.listenPlaying;\n    const eqBars = React.createElement('span',{style:{display:'inline-flex',alignItems:'center',gap:'2.5px',height:'18px'}},\n      [11,17,8,15,10].map((h,i)=>React.createElement('span',{key:i,style:{display:'inline-block',width:'3px',height:h+'px',borderRadius:'2px',background:'var(--sig-link)',transformOrigin:'center',animation:playing?`vyEq .85s ease-in-out ${i*0.11}s infinite`:'none'}})));\n\n    const reducedBtnStyle='font-family:\\'JetBrains Mono\\',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;border-radius:9px;padding:7px 11px;cursor:pointer;min-height:34px;border:1px solid '+(this.state.reducedShown?'color-mix(in oklab,var(--sig) 45%,transparent)':'var(--hair)')+';color:'+(this.state.reducedShown?'#fff':'var(--ink)')+';background:'+(this.state.reducedShown?'var(--sig-btn)':'var(--fill)')+';';\n\n    const tokenText =\n'threshold      '+T.THRESHOLD+' px   (commit if |dx| exceeds)\\n'+\n'velocity       |vx| > '+T.VEL+' px/ms  &  |dx| > '+T.MIN_FLICK+' px  → flick commit\\n'+\n'tilt           '+T.TILT+' deg/px, clamp ±'+T.MAX_TILT+'°\\n'+\n'edge elastic   '+T.EDGE_ELASTIC+'  (resistance on a no-op direction)\\n'+\n'exit  LEFT     x:-'+T.EXIT_X+'  y:-'+T.EXIT_Y+'  rot:-'+T.EXIT_ROT+'°  opacity:0   (up-left)\\n'+\n'exit  RIGHT    x:+'+T.EXIT_X+'  y:+'+T.EXIT_Y+'  rot:+'+T.EXIT_ROT+'°  opacity:0   (down-right)\\n'+\n'enter after L  from y:+'+T.ENTER_Y+' (rises from below)\\n'+\n'enter after R  from y:-'+T.ENTER_Y+' (drops from above)\\n'+\n'throw / enter  '+T.DUR_EXIT+'ms / '+T.DUR_ENTER+'ms  ease '+T.EASE+'  (enter delay '+T.ENTER_DELAY+'ms)\\n'+\n'spring back    '+T.DUR_SPRING+'ms  '+T.SPRING+'\\n'+\n'reduced motion no tilt · '+T.REDUCED_FADE+'ms cross-fade swap';\n\n    return {\n      stageRef:this.stageRef, cardRef:this.cardRef, ghostLayerRef:this.ghostLayerRef,\n      doneWashRef:this.doneWashRef, backWashRef:this.backWashRef,\n      onPointerDown:this.onPointerDown, onPointerMove:this.onPointerMove, onPointerUp:this.onPointerUp,\n\n      headerText: allDone?'DAY COMPLETE':`STOP ${currentNumber} OF ${st.length}`,\n      segs, showTrack: remaining>0, trackStyle,\n\n      hasCompleted: nC>0,\n      completedSummary,\n      completedOpen,\n      showCompletedRows: completedOpen && completedRows.length>0,\n      chevronDeg: completedOpen?90:0,\n      toggleCompleted:this.toggleCompleted,\n      completedRows, upcomingRows,\n      allDone,\n\n      focused:{ name:fs.name, subtitle:fs.type, number:f+1, completed:focusedCompleted, chipText, heroBg:fs.heroBg, dotStyle },\n\n      tabBody,\n      tabStoryStyle:this.tabStyle(tab==='story'),\n      tabFactsStyle:this.tabStyle(tab==='facts'),\n      tabExpStyle:this.tabStyle(tab==='experience'),\n      onStory:this.onStory, onFacts:this.onFacts, onExp:this.onExp,\n\n      eqBars, listenLabel: playing?'Narrating…':'Listen', speedLabel:'1.75×', onL
